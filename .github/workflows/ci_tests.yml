# SPDX-License-Identifier: Apache-2.0 WITH LLVM-exception

name: Continuous Integration Tests

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:
  schedule:
    - cron: '30 15 * * *'

jobs:
  beman-submodule-check:
    uses: ./.github/workflows/reusable-beman-submodule-check.yml

  build-and-test:
    uses: ./.github/workflows/reusable-beman-build-and-test.yml
    with:
      matrix_config: >
        {
          "gcc": [
            { "versions": ["15"],
              "tests": [
                { "cxxversions": ["c++26"],
                  "tests": [
                    { "stdlibs": ["libstdc++"],
                      "tests": [
                        "Debug.Default", "Release.Default", "Debug.TSan", "Debug.MaxSan",
                        "Debug.Werror", "Debug.Dynamic", "Debug.Coverage"
                      ]
                    }
                  ]
                },
                { "cxxversions": ["c++23", "c++20", "c++17"],
                  "tests": [{ "stdlibs": ["libstdc++"], "tests": ["Release.Default"]}]
                }
              ]
            }
          ]
        }
